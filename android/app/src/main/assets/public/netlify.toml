[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type    = "application/manifest+json"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Content-Type          = "application/javascript"
    Service-Worker-Allowed = "/"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
